<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Messdiener">
    <title>Messdiener Plan v3.1</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --primary: #007AFF;
            --text-main: #000000;
            --text-muted: #8E8E93;
            --border: #C6C6C8;
            --success: #34C759;
            --warning: #FF9500;
            --danger: #FF3B30;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 16px;
            padding-top: max(20px, env(safe-area-inset-top));
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 0 4px;
        }
        h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        .version { font-size: 14px; color: var(--text-muted); vertical-align: middle; font-weight: normal; }
        .settings-btn {
            background: none; border: none; color: var(--primary); cursor: pointer; padding: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .settings-btn svg { width: 28px; height: 28px; }
        
        h2 { margin-top: 0; margin-bottom: 12px; font-size: 13px; text-transform: uppercase; color: var(--text-muted); padding-left: 12px; letter-spacing: 0.5px; }
        
        .card {
            background-color: var(--card-bg);
            border-radius: 10px;
            margin-bottom: 24px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .card-padding { padding: 16px; }
        
        .ios-input-group {
            display: flex; flex-direction: column;
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
        }
        .ios-input-group:last-child { border-bottom: none; }
        .ios-input-group label { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
        .ios-input-group input[type="text"], .ios-input-group input[type="file"] {
            border: none; background: transparent; font-size: 16px; outline: none; padding: 0; color: var(--primary);
        }
        .ios-input-group input::placeholder { color: var(--text-muted); }

        textarea {
            width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-size: 15px;
            box-sizing: border-box; min-height: 80px; font-family: inherit; margin-top: 8px; resize: vertical;
        }

        /* iOS List Style for Editor */
        .editor-block { border-bottom: 8px solid var(--bg-color); }
        .editor-block-title { background: #f9f9f9; padding: 8px 16px; font-weight: 600; font-size: 14px; color: var(--primary); }
        .ios-list-row {
            display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #E5E5EA; background: #fff;
        }
        .ios-list-row:last-child { border-bottom: none; }
        .ios-list-row label { width: 90px; font-size: 16px; color: var(--text-main); font-weight: normal; margin: 0; }
        .ios-list-row input {
            flex: 1; border: none; font-size: 16px; text-align: right; color: var(--text-muted); outline: none; background: transparent;
        }
        .ios-list-row input:focus { color: var(--text-main); }

        button {
            background-color: var(--primary); color: white; border: none; border-radius: 10px;
            padding: 14px; font-size: 17px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 10px;
        }
        button:disabled { background-color: var(--text-muted); opacity: 0.7; }
        .btn-secondary { background-color: #E5E5EA; color: var(--primary); margin-top: 8px; padding: 10px; font-size: 15px; }

        /* Accordion Style */
        details { background: #F9F9F9; border-radius: 8px; margin-top: 12px; border: 1px solid var(--border); }
        summary {
            padding: 14px; font-weight: 600; font-size: 15px; cursor: pointer; list-style: none;
            display: flex; justify-content: space-between; align-items: center; color: var(--text-main);
        }
        summary::-webkit-details-marker { display: none; }
        summary::after { content: '▼'; font-size: 12px; color: var(--text-muted); }
        details[open] summary::after { content: '▲'; }
        .details-content { padding: 0 14px 14px 14px; }
        .details-label { display: block; font-size: 13px; font-weight: 600; margin-top: 12px; color: var(--text-muted); }

        #status { text-align: center; font-size: 14px; color: var(--text-muted); margin-top: 16px; font-weight: 500; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Messdiener <span class="version">v3.1</span></h1>
        <button class="settings-btn" onclick="toggleSettings()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>
    </div>

    <div id="settingsCard" class="card hidden">
        <h2>Einstellungen</h2>
        <div class="ios-input-group">
            <label>API-Schlüssel</label>
            <input type="text" id="apiKey" placeholder="AIzaSy...">
        </div>
        
        <div class="ios-input-group">
            <label>Gruppeneinteilung hochladen</label>
            <input type="file" id="gruppenPlanFile" accept="application/pdf,image/*">
            <button class="btn-secondary" onclick="extractGroups()" id="btnExtract">Gruppen aus Datei auslesen</button>
            <div id="extractStatus" style="font-size: 13px; color: var(--text-muted); margin-top: 5px;"></div>
        </div>

        <div class="card-padding" style="padding-top: 0;">
            <details>
                <summary>Erkannte Gruppen & Regeln bearbeiten</summary>
                <div class="details-content">
                    <span class="details-label">Gruppeneinteilung (Text):</span>
                    <textarea id="groupText" placeholder="Hier erscheint der ausgelesene Text der Gruppeneinteilung..."></textarea>
                    
                    <span class="details-label">Dienen IMMER zusammen:</span>
                    <textarea id="alwaysTogether" placeholder="z.B. Anna und Paul"></textarea>
                    
                    <span class="details-label">Dienen NIE zusammen:</span>
                    <textarea id="neverTogether" placeholder="z.B. Max und Moritz"></textarea>
                </div>
            </details>
            <button onclick="saveSettings()" style="background-color: var(--success);">Speichern</button>
        </div>
    </div>

    <div id="uploadCard" class="card">
        <h2>Aktueller Pfarrbrief</h2>
        <div class="ios-input-group" style="border-bottom: none;">
            <input type="file" id="pfarrbriefFile" accept="application/pdf,image/*">
        </div>
        <div class="card-padding" style="padding-top: 0;">
            <button id="btnAnalyze" onclick="analyzeData()">KI Auswertung starten</button>
            <div id="status"></div>
        </div>
    </div>

    <div id="editorSection" class="hidden">
        <h2>Plan prüfen & bearbeiten</h2>
        <div class="card" id="editorContainer" style="padding: 0; background: transparent; box-shadow: none;"></div>
        <button onclick="generatePDF()" style="background-color: var(--warning); margin-bottom: 40px;">PDF Plan erstellen</button>
    </div>

    <script>
        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve({ mimeType: file.type, data: reader.result.split(',')[1] });
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        window.onload = function() {
            if(localStorage.getItem('geminiApiKey')) {
                document.getElementById('apiKey').value = localStorage.getItem('geminiApiKey');
            } else {
                document.getElementById('settingsCard').classList.remove('hidden');
                document.getElementById('uploadCard').classList.add('hidden');
            }
            if(localStorage.getItem('savedGroupText')) document.getElementById('groupText').value = localStorage.getItem('savedGroupText');
            if(localStorage.getItem('savedAlwaysTogether')) document.getElementById('alwaysTogether').value = localStorage.getItem('savedAlwaysTogether');
            if(localStorage.getItem('savedNeverTogether')) document.getElementById('neverTogether').value = localStorage.getItem('savedNeverTogether');
        };

        function toggleSettings() {
            document.getElementById('settingsCard').classList.toggle('hidden');
            document.getElementById('uploadCard').classList.toggle('hidden');
        }

        async function extractGroups() {
            const apiKey = document.getElementById('apiKey').value;
            const fileInput = document.getElementById('gruppenPlanFile');
            const statusDiv = document.getElementById('extractStatus');
            const btn = document.getElementById('btnExtract');

            if(!apiKey) return alert("Bitte zuerst den API-Schlüssel eingeben.");
            if(fileInput.files.length === 0) return alert("Bitte lade eine Datei mit der Gruppeneinteilung hoch.");

            btn.disabled = true;
            statusDiv.innerText = "Lese Dokument... ⏳";

            try {
                const fileData = await readFileAsBase64(fileInput.files[0]);
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [
                                { text: "Schreibe die gesamte Gruppeneinteilung (Welche Gruppe hat welche Mitglieder) aus diesem Dokument als übersichtlichen Text heraus. Lass unnötige Dekorationen weg." },
                                { inlineData: { mimeType: fileData.mimeType, data: fileData.data } }
                            ] 
                        }]
                    })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const extractedText = data.candidates[0].content.parts[0].text;
                document.getElementById('groupText').value = extractedText;
                
                document.querySelector('details').open = true;
                statusDiv.innerText = "Erfolgreich ausgelesen! Siehe unten.";
                
            } catch(e) {
                statusDiv.innerText = "Fehler beim Auslesen.";
                alert(e.message);
            } finally {
                btn.disabled = false;
            }
        }

        function saveSettings() {
            const apiKey = document.getElementById('apiKey').value;
            if(!apiKey) return alert("Bitte API-Schlüssel eingeben.");
            
            localStorage.setItem('geminiApiKey', apiKey);
            localStorage.setItem('savedGroupText', document.getElementById('groupText').value);
            localStorage.setItem('savedAlwaysTogether', document.getElementById('alwaysTogether').value);
            localStorage.setItem('savedNeverTogether', document.getElementById('neverTogether').value);
            
            toggleSettings();
        }

        async function analyzeData() {
            const apiKey = localStorage.getItem('geminiApiKey');
            const groupText = document.getElementById('groupText').value;
            const alwaysTogether = document.getElementById('alwaysTogether').value;
            const neverTogether = document.getElementById('neverTogether').value;
            
            const pfarrbriefInput = document.getElementById('pfarrbriefFile');
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('btnAnalyze');

            if (!apiKey || !groupText) return alert("Bitte in den Einstellungen die Gruppen hinterlegen!");
            if (pfarrbriefInput.files.length === 0) return alert("Pfarrbrief hochladen!");

            btn.disabled = true;
            statusDiv.innerHTML = "Werte Pfarrbrief aus... Bitte warten ⏳";

            try {
                const pfarrbriefData = await readFileAsBase64(pfarrbriefInput.files[0]);

                let promptText = `Du bist ein Assistent für Messdienerpläne.
                Hier ist die aktuelle Gruppeneinteilung als Text:
                "${groupText}"
                
                Aufgaben zum angehängten Pfarrbrief (Bild/PDF):
                1. Finde alle Gottesdienste NUR für den Ort "Thalau".
                2. Ignoriere Rosenkränze und Unterrichte. Beerdigungen/Hochzeiten in Thalau einbeziehen.
                3. Bestimme die diensthabende Gruppe anhand des Pfarrbriefs.
                4. Teile ein: Unter der Woche 2 Messdiener, Sonntag 4 Messdiener. Bei Hochzeiten/Beerdigungen keine Namen.
                
                WICHTIGE REGELN FÜR DIE ZUTEILUNG DER NAMEN:
                - Diese Personen IMMER zusammen einteilen: ${alwaysTogether || "Keine Regel"}
                - Diese Personen NIEMALS zusammen einteilen: ${neverTogether || "Keine Regel"}
                
                Gib AUSSCHLIESSLICH ein JSON-Array zurück. Format: 
                [{"datum": "TT.MM.", "uhrzeit": "HH:MM", "messdiener": "Name 1, Name 2"}]`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [
                                { text: promptText },
                                { inlineData: { mimeType: pfarrbriefData.mimeType, data: pfarrbriefData.data } }
                            ] 
                        }],
                        generationConfig: { response_mime_type: "application/json" }
                    })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const rawJson = data.candidates[0].content.parts[0].text;
                renderEditor(JSON.parse(rawJson));
                statusDiv.innerHTML = "<span style='color: var(--success);'>Erfolgreich erstellt!</span>";
                document.getElementById('editorSection').classList.remove('hidden');

            } catch (error) {
                console.error(error);
                statusDiv.innerHTML = `<span style='color: var(--danger);'>Fehler: ${error.message}</span>`;
            } finally {
                btn.disabled = false;
            }
        }

        function renderEditor(dataArray) {
            const container = document.getElementById('editorContainer');
            container.innerHTML = ''; 
            dataArray.forEach((item, index) => {
                container.innerHTML += `
                    <div class="card editor-block">
                        <div class="editor-block-title">Gottesdienst ${index + 1}</div>
                        <div class="ios-list-row">
                            <label>Datum</label>
                            <input type="text" id="datum_${index}" value="${item.datum || ''}" placeholder="TT.MM.">
                        </div>
                        <div class="ios-list-row">
                            <label>Uhrzeit</label>
                            <input type="text" id="uhrzeit_${index}" value="${item.uhrzeit || ''}" placeholder="HH:MM">
                        </div>
                        <div class="ios-list-row">
                            <label>Eingeteilte</label>
                            <input type="text" id="messdiener_${index}" value="${item.messdiener || ''}" placeholder="-">
                        </div>
                    </div>`;
            });
            container.dataset.count = dataArray.length;
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let y = 20;
            const margin = 20;

            doc.setFont("helvetica", "bold");
            doc.setFontSize(16);
            doc.text("Ministrantinnen/Ministranten Dienst", 105, y, { align: "center" });
            y += 15;

            const count = parseInt(document.getElementById('editorContainer').dataset.count || 0);

            for(let i = 0; i < count; i++) {
                if (y > 270) {
                    doc.addPage();
                    y = 20;
                }

                const datum = document.getElementById(`datum_${i}`).value;
                const uhrzeit = document.getElementById(`uhrzeit_${i}`).value;
                let messdienerStr = document.getElementById(`messdiener_${i}`).value || "";

                // Abschnittsüberschrift für den Gottesdienst
                doc.setFont("helvetica", "bold");
                doc.setFontSize(12);
                doc.text(`${datum} um ${uhrzeit} Uhr`, margin, y);
                y += 8;

                // Namen untereinander auflisten
                doc.setFont("helvetica", "normal");
                if (messdienerStr && messdienerStr !== "-") {
                    const names = messdienerStr.split(',').map(n => n.trim());
                    names.forEach(name => {
                        doc.text(name, margin, y);
                        y += 6;
                    });
                } else {
                    doc.text("-", margin, y);
                    y += 6;
                }
                
                y += 6; // Abstand vor dem nächsten Eintrag
            }

            doc.save("Messdienerplan.pdf");
        }
    </script>
</body>
</html>
