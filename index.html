        function TrackingOverlay({ event, currentFamily, currentUser, safeMembers, onClose, onResend }) {
            if (!event) return null;
            const [cooldowns, setCooldowns] = useState({});

            const isSender = event.sender === currentUser?.name || event.sender === 'Extern';

            useEffect(() => {
                const calculateCooldowns = () => {
                    const newCooldowns = {};
                    (event.targets || []).forEach(targetName => {
                        const lastSentStr = sessionStorage.getItem(`resend_${event.id}_${targetName}`);
                        const lastSentTime = lastSentStr ? parseInt(lastSentStr, 10) : new Date(event.timestamp).getTime();
                        const passed = Math.floor((Date.now() - lastSentTime) / 1000);
                        newCooldowns[targetName] = passed >= 60 ? 0 : 60 - passed;
                    });
                    return newCooldowns;
                };

                setCooldowns(calculateCooldowns());
                const timer = setInterval(() => {
                    setCooldowns(calculateCooldowns());
                }, 1000);
                
                return () => clearInterval(timer);
            }, [event.id, event.timestamp, event.targets]);

            return (
                <div className="fixed inset-0 z-[90] flex items-end justify-center bg-black/40 backdrop-blur-md animate-fade-in md:items-center">
                    <div className="bg-[#F2F2F7] dark:bg-black w-full md:max-w-md md:rounded-[24px] rounded-t-[24px] p-6 pb-safe shadow-2xl animate-scale-in max-h-[85vh] overflow-y-auto scroll-smooth">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-[22px] font-bold tracking-tight text-black dark:text-white">Ruf Status</h2>
                            <button onClick={onClose} className="w-8 h-8 bg-gray-200/60 dark:bg-[#2C2C2E] rounded-full flex items-center justify-center text-gray-500 dark:text-gray-300 active:opacity-70"><Icon name="X" size={18}/></button>
                        </div>
                        <p className="text-[#3C3C4399] dark:text-[#EBEBF5]/60 mb-6 font-medium bg-white dark:bg-[#1C1C1E] p-4 rounded-[16px] text-[15px] shadow-sm border border-[#E5E5EA] dark:border-[#38383A]">"{event?.reason}"</p>
                        
                        <div className="space-y-3">
                            {(event.targets || []).map(targetName => {
                                const safeAck = Array.isArray(event.acknowledgedBy) ? event.acknowledgedBy : [];
                                const ackEntry = safeAck.find(ack => ack === targetName || ack.startsWith(targetName + ':'));
                                const hasAck = !!ackEntry;
                                
                                let ackText = 'Hat bestätigt!';
                                if (hasAck && ackEntry.includes(':')) {
                                    ackText = ackEntry.split(':')[1];
                                }

                                const targetMember = safeMembers.find(m => m.name === targetName);
                                const isDND = targetMember?.dndUntil && new Date(targetMember.dndUntil) > new Date();
                                const currentCooldown = cooldowns[targetName] || 0;
                                
                                const isExpiredTime = event.timestamp ? (Date.now() - new Date(event.timestamp).getTime()) > 5 * 60 * 1000 : false;
                                const canResendIndividual = isSender && !isExpiredTime;

                                return (
                                    <div key={targetName} className="flex items-center justify-between bg-white dark:bg-[#1C1C1E] border border-[#E5E5EA] dark:border-[#38383A] p-4 rounded-[16px] shadow-[0_1px_3px_rgba(0,0,0,0.02)]">
                                        <div className="flex items-center gap-3">
                                            {hasAck ? <Icon name="CheckCircle2" className={getStatusColor(ackEntry)} /> : isDND ? <Icon name="BellOff" className="text-[#FF9500]" /> : <div className="w-6 h-6 rounded-full border-2 border-gray-200 dark:border-gray-600 animate-pulse" />}
                                            <div>
                                                <p className="font-semibold text-[17px] text-black dark:text-white">{targetName}</p>
                                                <p className={`text-[13px] font-normal ${hasAck ? getStatusColor(ackEntry) : 'text-[#3C3C4399] dark:text-[#EBEBF5]/60'}`}>
                                                    {hasAck ? ackText : isDND ? 'Bitte nicht stören aktiv' : isExpiredTime ? 'Nicht geantwortet' : 'Wartet auf Antwort...'}
                                                </p>
                                            </div>
                                        </div>
                                        {!hasAck && !isDND && canResendIndividual && (
                                            <button 
                                                disabled={currentCooldown > 0}
                                                onClick={() => { 
                                                    sessionStorage.setItem(`resend_${event.id}_${targetName}`, Date.now().toString());
                                                    setCooldowns(prev => ({...prev, [targetName]: 60}));
                                                    onResend(targetName, event.reason); 
                                                }}
                                                className={`text-[13px] font-semibold px-4 py-2 rounded-full transition-all ${currentCooldown > 0 ? 'bg-[#F2F2F7] dark:bg-[#2C2C2E] text-gray-400' : 'bg-[#007AFF]/10 text-[#007AFF] active:opacity-70'}`}
                                            >
                                                {currentCooldown > 0 ? `${currentCooldown}s` : 'Nochmal'}
                                            </button>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                        <button onClick={onClose} className="w-full mt-8 py-3.5 bg-white dark:bg-[#1C1C1E] font-semibold text-[17px] text-[#007AFF] rounded-[14px] active:opacity-70 shadow-sm border border-[#E5E5EA] dark:border-[#38383A]">Schließen</button>

        }

        function ConfigLoader({ onConfigLoaded }) {

            const handleFileUpload = (e) => {
                const file = e.target.files[0];

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        localStorage.setItem('familyConnectAppConfig', JSON.stringify(parsed));
                        localStorage.setItem('firebaseConfig', JSON.stringify(parsed));
                        onConfigLoaded(parsed);
                    } catch (err) { setError("Fehler: Ungültiges Dateiformat."); }
                };
                reader.onerror = () => setError("Fehler beim Lesen der Datei.");
                reader.readAsText(file);
            };

            return (
                <div className="fixed inset-0 z-50 flex flex-col items-center justify-center p-8 bg-[#000000] text-white w-full h-full overflow-y-auto">

        const LiquidTabBar = ({ activeTab, setActiveTab, isKeyboardOpen }) => {
          const tabs = [
            { id: 'home', icon: 'Bell' },

                  <div className="w-[46px] h-[46px] bg-[#007AFF]/15 dark:bg-[#007AFF]/25 rounded-full flex-shrink-0"></div>
                </div>
                {tabs.map((tab) => {
                  const isActive = activeTab === tab.id;
                  return (
                    <button key={tab.id} onClick={() => { if(navigator.vibrate) navigator.vibrate(10); setActiveTab(tab.id); }} className="flex-1 relative z-10 flex items-center justify-center h-full active:opacity-60 transition-opacity">
                      <Icon name={tab.icon} size={isActive ? 24 : 22} strokeWidth={isActive ? 2.5 : 2} className={`transition-colors duration-300 flex-shrink-0 ${isActive ? 'text-[#007AFF]' : 'text-[#8E8E93] dark:text-[#98989D]'}`} />
                    </button>
                  );

              </div>

          );
        };

        const getNextSaturday = () => {
            const d = new Date();
            const diff = (6 - d.getDay() + 7) % 7;
            d.setDate(d.getDate() + diff);
            return d.toISOString().split('T')[0];
        };

        const getWeekNumber = (d) => {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
        };

        const safeFormatDateTime = (ts) => {
            if (!ts) return '';
            const d = new Date(ts);
            if (isNaN(d.getTime())) return '';
            return `am ${d.toLocaleDateString('de-DE')} um ${d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} Uhr`;
        };

        function App() {
          const [appLoaded, setAppLoaded] = useState(false);
          const [firebaseUser, setFirebaseUser] = useState(null);
          
          const [localFamilyId, setLocalFamilyId] = useState(() => localStorage.getItem('familyId'));

          const [modal, setModal] = useState(null);
          const [isKeyboardOpen, setIsKeyboardOpen] = useState(false);

          const [authMode, setAuthMode] = useState('login');
          const [isAdminMode, setIsAdminMode] = useState(false); 
          const [adminFamilies, setAdminFamilies] = useState([]);
          const [newFamilyName, setNewFamilyName] = useState('');
          const [newMemberNames, setNewMemberNames] = useState({});

          const [formInput, setFormInput] = useState({ familyId: '', familyName: '', name: '', password: '' });
          const [authError, setAuthError] = useState('');

          const [expenseModal, setExpenseModal] = useState(null); 
          const [expenseForm, setExpenseForm] = useState({ amount: '', reason: '', date: getLocalTodayString(), splitCount: 1, splitTargets: [] });

          const [householdAdminMode, setHouseholdAdminMode] = useState(false);
          const [householdHistoryModal, setHouseholdHistoryModal] = useState(null);
          const [householdSwapModal, setHouseholdSwapModal] = useState(null);
          const [newChoreName, setNewChoreName] = useState("");

          const [adminPushData, setAdminPushData] = useState({});

          const [activeTab, setActiveTab] = useState(() => {
              const params = new URLSearchParams(window.location.search);

                      newChores.forEach((chore, i) => {

                  const freshData = docSnap.data();

                  if (action === 'complete') {
                      freshTasks[taskIndex].status = 'completed';
                      freshTasks[taskIndex].completedAt = new Date().toISOString();
                      freshTasks[taskIndex].completedBy = currentUser.name;

                      freshTasks[taskIndex].status = 'open';
                      freshTasks[taskIndex].assignedTo = null;
                  } else if (action === 'takeover') {
                      freshTasks[taskIndex].status = 'pending';
                      freshTasks[taskIndex].assignedTo = currentUser.name;
                      freshTasks[taskIndex].swapRequestedWith = null;
                  } else if (action === 'request_swap') {
                      freshTasks[taskIndex].swapRequestedWith = data;
                      const newHistoryItem = { 
                          id: Date.now().toString(), timestamp: new Date().toISOString(), sender: currentUser.name, 
                          reason: `Vertretung gesucht für: ${freshTasks[taskIndex].choreName}`, 
                          targets: [data], acknowledgedBy: [], isExpense: false, isResend: false, isHousehold: true,
                          isSwapRequest: true, taskId: taskId, choreName: freshTasks[taskIndex].choreName
                      };
                      await docRef.update({ history: [newHistoryItem, ...(freshData.history || [])].slice(0, 50) });
                  } else if (action === 'accept_swap') {
                      const requester = freshTasks[taskIndex].assignedTo;
                      const accepter = currentUser.name;
                      
                      freshTasks[taskIndex].assignedTo = currentUser.name;
                      freshTasks[taskIndex].swapRequestedWith = null;

                      const newHistoryItem = { 
                          id: Date.now().toString(), timestamp: new Date().toISOString(), sender: 'System', 
                          reason: `${accepter} hat deine Vertretungsanfrage für ${freshTasks[taskIndex].choreName} übernommen!`, 
                          historyText: `${accepter} vertritt ${requester}`,
                          choreName: freshTasks[taskIndex].choreName,
                          targets: [requester], acknowledgedBy: [], isExpense: false, isResend: false, isHousehold: true,
                          isSuccessfulSwap: true
                      };
                      await docRef.update({ history: [newHistoryItem, ...(freshData.history || [])].slice(0, 50) });

                  } else if (action === 'reject_swap') {
                      const requester = freshTasks[taskIndex].assignedTo;
                      freshTasks[taskIndex].swapRequestedWith = null;
                      
                      const newHistoryItem = { 
                          id: Date.now().toString(), timestamp: new Date().toISOString(), sender: 'System', 
                          reason: `${currentUser.name} hat deine Vertretungsanfrage abgelehnt.`, 
                          targets: [requester], acknowledgedBy: [], isExpense: false, isResend: false, isHousehold: true,
                          isRejectedSwap: true
                      };
                      await docRef.update({ history: [newHistoryItem, ...(freshData.history || [])].slice(0, 50) });
                  } else if (action === 'admin_reassign') {
                      freshTasks[taskIndex].assignedTo = data;
                      freshTasks[taskIndex].status = 'pending';
                      freshTasks[taskIndex].swapRequestedWith = null;
                  }

                  await docRef.update({ householdTasks: freshTasks });
                  if(navigator.vibrate) navigator.vibrate(10);
              } catch (e) { showAlert("Fehler", "Aktion fehlgeschlagen."); }
          };

          const toggleHouseholdMember = async (name) => {
              const newMembers = safeHouseholdMembers.includes(name) 
                  ? safeHouseholdMembers.filter(m => m !== name) 
                  : [...safeHouseholdMembers, name];
              await updateHouseholdConfig(newMembers, safeHouseholdChores);

          const handleAddChore = async () => {

          const handleDeleteChore = async (choreId) => {

          const toggleCoAdmin = async (name) => {
              const newAdmins = safeHouseholdAdmins.includes(name)
                  ? safeHouseholdAdmins.filter(n => n !== name)
                  : [...safeHouseholdAdmins, name];
              await getFamilyDocRef(currentFamily.id).update({ 'householdConfig.admins': newAdmins });
          };

          // --- SILENT PUSH ---
          const requestPushPermission = async (silent = false) => {
            if (!window.isSecureContext) {
                if (!silent) showAlert("Fehler", "Push funktioniert nur über HTTPS.");
                return;
            }
            
            if (!('Notification' in window) || !('serviceWorker' in navigator)) {
                if (!silent) showAlert("Push-Fehler", "Push wird in diesem Modus nicht unterstützt. Bitte als Web-App auf dem Home-Bildschirm speichern.");
                return;
            }

            if (!firebase?.messaging) {
                if (!silent) showAlert("Fehler", "Firebase Messaging ist nicht verfügbar.");
                return;
            }

            try {
                const supported = firebase.messaging.isSupported ? await firebase.messaging.isSupported() : true;
                if (!supported) {
                    if (!silent) showAlert("Fehler", "Push ist auf diesem Gerät/Browser nicht verfügbar.");
                    return;
                }
            } catch (e) {}

            if (!messaging) {
                try { messaging = firebase.messaging(); } catch (e) { 
                    if (!silent) showAlert("Fehler", "Push-Dienst konnte nicht gestartet werden."); 
                    return; 
                }
            }
            
            let storedConfig = {};
            let firebaseConfigObj = {};
            try { 
                const rawConfig = localStorage.getItem('firebaseConfig') || localStorage.getItem('familyConnectAppConfig');
                if (rawConfig) {
                    const parsed = JSON.parse(rawConfig);
                    storedConfig = parsed.vapidKey ? parsed : (parsed.firebaseConfig || {});
                    firebaseConfigObj = parsed.firebaseConfig || parsed;
                }
            } catch(e) {}
            
            const vapidKey = currentFamily?.vapidKey || storedConfig.vapidKey;
            
            if (!vapidKey || !vapidKey.trim()) {
                if (!silent) showAlert("Fehler", "Kein VAPID-Key gefunden! Bitte lade als Administrator die config.json noch einmal hoch.");
                return;
            }
            
            let swReg = await navigator.serviceWorker.getRegistration();
            if (!swReg) {
                try {
                    const swUrl = `./firebase-messaging-sw.js?apiKey=${encodeURIComponent(firebaseConfigObj.apiKey || '')}&projectId=${encodeURIComponent(firebaseConfigObj.projectId || '')}&senderId=${encodeURIComponent(firebaseConfigObj.messagingSenderId || '')}&appId=${encodeURIComponent(firebaseConfigObj.appId || '')}`;
                    swReg = await navigator.serviceWorker.register(swUrl);
                } catch(e) {
                    console.error("SW Registration Error:", e);
                    if (!silent) showAlert("Push-Registrierung", "Fehler beim Starten des Hintergrunddienstes. Auf dem iPhone: Bitte über 'Teilen' -> 'Zum Home-Bildschirm' hinzufügen.");
                    return;
                }
            } else {
                await swReg.update();
            }

            if (!silent) setPushStatus('Wird angefragt...');
            try {
              const permission = await Notification.requestPermission();
              if (permission !== 'granted') {
                  setPushStatus('Abgelehnt ❌');
                  return;
              }

              const token = await messaging.getToken({
                  vapidKey: vapidKey.trim(),
                  serviceWorkerRegistration: swReg
              });

              if (!token) {
                  setPushStatus('Fehler');
                  if (!silent) showAlert("Fehler", "Es konnte kein Push-Token erzeugt werden.");
                  return;
              }

              if (currentUser?.fcmToken !== token) {
                  await getFamilyDocRef(currentFamily.id).update({
                      members: safeMembers.map(m => m.name === currentUser?.name ? { ...m, fcmToken: token } : m)
                  });
              }
              
              setPushStatus('Aktiviert ✅'); 
              if (!silent) showAlert("Erfolg", "Push-Mitteilungen wurden erfolgreich aktiviert!");

            } catch (error) { 
                console.error(error); 
                setPushStatus('Fehler'); 
                if (!silent) showAlert("Fehler", "Kritischer Fehler beim Token-Abruf."); 
            }
          };

          const handleSendNotification = async (customReasonObj = null, customTargets = null, isResend = false) => {
            const reasonObj = customReasonObj || REASONS.find(r => r.id === selectedReason);
            const targetsList = customTargets || selectedMembers;
            if (!reasonObj || targetsList.length === 0) return;
            
            const todayCalls = safeHistory.filter(h => h?.sender === currentUser.name && h?.timestamp && new Date(h.timestamp).toDateString() === new Date().toDateString());
            if (todayCalls.length >= 20) return showAlert("Limit erreicht", "Du hast heute bereits 20 Rufe gesendet.");

            setIsSending(true); if(navigator.vibrate) navigator.vibrate(10);
            const now = new Date(); const isNightMode = now.getHours() >= 22 || now.getHours() < 7;
            const actualTargets = [];

            safeMembers.forEach(member => {
                if (member && targetsList.includes(member.name) && member.status !== 'pending') {
                    const isDND = member.dndUntil && new Date(member.dndUntil) > now;
                    if (!isDND) {
                        actualTargets.push(member.name);
                        if (!isNightMode && reasonObj.category !== 'push_only') {
                            const url = reasonObj.category === 'meal' ? member.voiceMonkeyMeal : member.voiceMonkeyOther;
                            if (url && url.trim() !== '') fetch(url).catch(e => {});
                        }
                    }
                }
            });

            if (actualTargets.length === 0) {
                setIsSending(false);
                return showAlert("Hinweis", "Alle ausgewählten Personen haben aktuell 'Nicht stören' aktiviert.");
            }

            const newHistoryItem = { 
                id: Date.now().toString(), 
                timestamp: now.toISOString(), 
                sender: currentUser.name, 
                reason: reasonObj.sentence, 
                targets: actualTargets, 
                acknowledgedBy: [], 
                isExpense: false, 
                isResend: isResend,
                category: reasonObj.category 
            };

            try {
              await getFamilyDocRef(currentFamily.id).update({ history: [newHistoryItem, ...safeHistory].slice(0, 50) });
              if(navigator.vibrate) navigator.vibrate([30, 50, 30]);
              if (!customReasonObj && reasonObj.category !== 'push_only' && !isResend) setTrackingEventId(newHistoryItem.id);
              setSelectedReason(null); setSelectedMembers([]); 
            } catch (err) {}
            setTimeout(() => setIsSending(false), 800);
          };

          const handleAcknowledge = async (historyItemId, responseType = 'Bestätigt') => {
            if(navigator.vibrate) navigator.vibrate([20, 30]);
            const responseString = `${currentUser.name}:${responseType}`;

            try {
                const docRef = getFamilyDocRef(currentFamily.id);
                const docSnap = await docRef.get();
                if (!docSnap.exists) return;
                
                const freshData = docSnap.data();
                const freshHistory = freshData.history || [];
                
                let changed = false;
                const updatedHistory = freshHistory.map(item => {
                    if (item.id === historyItemId) {
                        const safeAck = Array.isArray(item.acknowledgedBy) ? item.acknowledgedBy : [];
                        const alreadyAcked = safeAck.some(ack => ack === currentUser.name || ack.startsWith(currentUser.name + ':'));
                        if (!alreadyAcked) {
                            changed = true;
                            return { ...item, acknowledgedBy: [...safeAck, responseString] };
                        }
                    }
                    return item;
                });

                if (changed) {
                    await docRef.update({ history: updatedHistory });
                }
            } catch (e) {
                console.error("Fehler beim Bestätigen:", e);
            }
          };

          // --- SHOPPING FUNKTIONEN (NEU) ---
          
          // Bestimme die Listen, die der Nutzer sehen darf
          const myShoppingLists = safeShoppingLists.filter(list => {
              if (list.sharedWith.includes('Alle')) return true;
              if (list.createdBy === currentUser?.name) return true;
              if (list.sharedWith.includes(currentUser?.name)) return true;
              return false;
          });

          // Setze Standard-Liste, falls nicht gewählt
          useEffect(() => {
              if (!selectedShoppingListId && myShoppingLists.length > 0) {
                  setSelectedShoppingListId(myShoppingLists[0].id);
              }
          }, [myShoppingLists, selectedShoppingListId]);

          const activeList = myShoppingLists.find(l => l.id === selectedShoppingListId);

          const handleCreateList = async (listData) => {
              if (!listData.name.trim()) return;
              
              const newList = {
                  id: generateId(),
                  name: listData.name.trim(),
                  sharedWith: listData.sharedWith,
                  createdBy: currentUser.name,
                  items: [],
                  timestamp: new Date().toISOString()
              };

              try {
                  await getFamilyDocRef(currentFamily.id).update({ shoppingLists: [...safeShoppingLists, newList] });
                  setSelectedShoppingListId(newList.id);
                  if(navigator.vibrate) navigator.vibrate(10);
                  setModal(null);
              } catch(e) { showAlert("Fehler", "Konnte Liste nicht erstellen."); }
          };

          const performDeleteList = async (listId) => {
              try {
                  const updated = safeShoppingLists.filter(l => l.id !== listId);
                  await getFamilyDocRef(currentFamily.id).update({ shoppingLists: updated });
                  if (selectedShoppingListId === listId) setSelectedShoppingListId(null);
              } catch(e) {}
          };

          const handleDeleteList = async (listId) => {
              showConfirm("Liste löschen", "Möchtest du diese Einkaufsliste mitsamt allen Artikeln wirklich löschen?", async () => {
                  await performDeleteList(listId);
              }, true);
          };

          const handleAddShoppingItem = async () => {
              if (!newShoppingItem.name.trim() || !activeList) return;
              
              const category = getAutoCategory(newShoppingItem.name);
              const combinedAmount = `${newShoppingItem.amountValue} ${newShoppingItem.amountUnit}`.trim();
              
              const newItem = {
                  id: generateId(),
                  name: newShoppingItem.name.trim(),
                  amount: combinedAmount,
                  notes: newShoppingItem.notes.trim(),
                  category: category,
                  addedBy: currentUser.name,
                  checked: false,
                  timestamp: new Date().toISOString()
              };

              try {
                  const updatedLists = safeShoppingLists.map(l => {
                      if (l.id === activeList.id) {
                          return { ...l, items: [...(l.items || []), newItem] };
                      }
                      return l;
                  });
                  await getFamilyDocRef(currentFamily.id).update({ shoppingLists: updatedLists });
                  setNewShoppingItem({ name: '', amountValue: '', amountUnit: '', notes: '' });
                  if(navigator.vibrate) navigator.vibrate(10);
              } catch(e) { showAlert("Fehler", "Konnte nicht hinzugefügt werden."); }
          };

          const handleToggleShoppingItem = async (itemId, checked) => {
              if (isShoppingMode && navigator.vibrate) navigator.vibrate([15, 25]);
              try {
                  const updatedLists = safeShoppingLists.map(l => {
                      if (l.id === activeList.id) {
                          const newItems = (l.items || []).map(i => i.id === itemId ? { ...i, checked: checked } : i);
                          return { ...l, items: newItems };
                      }
                      return l;
                  });
                  await getFamilyDocRef(currentFamily.id).update({ shoppingLists: updatedLists });
              } catch(e) {}
          };

          const handleDeleteShoppingItem = async (itemId) => {
              try {
                  const updatedLists = safeShoppingLists.map(l => {
                      if (l.id === activeList.id) {
                          const newItems = (l.items || []).filter(i => i.id !== itemId);
                          return { ...l, items: newItems };
                      }
                      return l;
                  });
                  await getFamilyDocRef(currentFamily.id).update({ shoppingLists: updatedLists });
              } catch(e) {}
          };
          
          const handleSaveEditedShoppingItem = async (editedItem) => {
              try {
                  const updatedLists = safeShoppingLists.map(l => {
                      if (l.id === activeList.id) {
                          const newItems = (l.items || []).map(i => i.id === editedItem.id ? { ...i, ...editedItem, category: getAutoCategory(editedItem.name) } : i);
                          return { ...l, items: newItems };

                  await getFamilyDocRef(currentFamily.id).update({ shoppingLists: updatedLists });
                  setModal(null);
              } catch(e) { showAlert("Fehler", "Konnte nicht gespeichert werden."); }
          };

          const handleDeleteAllCheckedItems = async () => {
              showConfirm("Aufräumen", "Möchtest du alle erledigten Artikel dauerhaft löschen?", async () => {
                  try {
                      const updatedLists = safeShoppingLists.map(l => {
                          if (l.id === activeList.id) {
                              return { ...l, items: (l.items || []).filter(i => !i.checked) };

                          return l;
                      });
                      await getFamilyDocRef(currentFamily.id).update({ shoppingLists: updatedLists });

              }, true);
          };

          const toggleShoppingMode = async () => {
              if (isShoppingMode) {
                  // Schließe Modus
                  if (activeShoppingItems.length === 0 && checkedShoppingItems.length > 0) {
                      showConfirm("Einkauf abgeschlossen!", "Du hast alle Artikel besorgt. Möchtest du diese Einkaufsliste nun löschen?", async () => {
                          await performDeleteList(activeList.id);
                          setIsShoppingMode(false);

                      try {
                          const updatedLists = safeShoppingLists.map(l => l.id === activeList.id ? { ...l, shoppingActiveBy: null } : l);
                          await getFamilyDocRef(currentFamily.id).update({ shoppingLists: updatedLists });
                      } catch(e) {}
                      setIsShoppingMode(false);
                  }
              } else {
                  // Öffne Modus
                  if (activeList.shoppingActiveBy && activeList.shoppingActiveBy !== currentUser.name) {
                       showAlert("Gesperrt", `${activeList.shoppingActiveBy} kauft diese Liste gerade ein!`);
                       return;
                  }
                  try {
                      const updatedLists = safeShoppingLists.map(l => l.id === activeList.id ? { ...l, shoppingActiveBy: currentUser.name } : l);
                      await getFamilyDocRef(currentFamily.id).update({ shoppingLists: updatedLists });
                  } catch(e) {}
                  setIsShoppingMode(true);
              }
          };

          const handleExtendList = async (listId) => {
              try {
                  const updatedLists = safeShoppingLists.map(l => l.id === listId ? { ...l, timestamp: new Date().toISOString(), expirationWarned: false } : l);
                  await getFamilyDocRef(currentFamily.id).update({ shoppingLists: updatedLists });
                  showAlert("Erfolgreich", "Die Liste wurde um 3 Monate verlängert.");
              } catch(e) {}
          };

          // --- POLL FUNKTIONEN ---
          const handleAddPoll = async () => {
              if (!newPoll.question.trim()) return showAlert("Fehler", "Bitte eine Frage eingeben.");
              if (!newPoll.votingDeadline) return showAlert("Fehler", "Bitte eine Frist für die Abstimmung festlegen.");
              
              let validOptions = newPoll.options.filter(o => o.trim() !== '');
              
              if (newPoll.type === 'direct') {
                  if (validOptions.length < 2) return showAlert("Fehler", "Bitte mindestens zwei Optionen angeben.");
              } else {
                  if (!newPoll.collectionDeadline) return showAlert("Fehler", "Bitte eine Frist für das Sammeln festlegen.");
                  if (new Date(newPoll.collectionDeadline) >= new Date(newPoll.votingDeadline)) return showAlert("Fehler", "Die Sammel-Frist muss vor der Abstimmungs-Frist liegen.");
              }

              const pollObj = {
                  id: generateId(),
                  type: newPoll.type,
                  question: newPoll.question.trim(),
                  options: validOptions.map(opt => ({ id: generateId(), text: opt.trim(), votes: [], addedBy: currentUser.name })),
                  collectionDeadline: newPoll.type === 'collection' ? new Date(newPoll.collectionDeadline).toISOString() : null,
                  votingDeadline: new Date(newPoll.votingDeadline).toISOString(),
                  sharedWith: newPoll.sharedWith,
                  createdBy: currentUser.name,
                  active: true,
                  reminded: false,
                  timestamp: new Date().toISOString()
              };

              try {
                  await getFamilyDocRef(currentFamily.id).update({ polls: [pollObj, ...safePolls] });
                  setNewPoll({ type: 'direct', question: '', options: ['', '', ''], collectionDeadline: getLocalIsoString(12), votingDeadline: getLocalIsoString(48), sharedWith: ['Alle'] });
                  setIsCreatingPoll(false);
              } catch(e) { showAlert("Fehler", "Konnte nicht erstellt werden."); }
          };

          const handleAddPollOption = async (pollId) => {
              const text = pollNewOptions[pollId];
              if (!text || !text.trim()) return;
              
              try {
                  const updatedPolls = safePolls.map(poll => {
                      if (poll.id !== pollId) return poll;
                      return { ...poll, options: [...poll.options, { id: generateId(), text: text.trim(), votes: [], addedBy: currentUser.name }] };
                  });
                  await getFamilyDocRef(currentFamily.id).update({ polls: updatedPolls });
                  setPollNewOptions({ ...pollNewOptions, [pollId]: '' });
              } catch(e) {}
          };

          const handleVote = async (pollId, optionId) => {
              if(navigator.vibrate) navigator.vibrate(10);
              try {
                  const updatedPolls = safePolls.map(poll => {
                      if (poll.id !== pollId) return poll;
                      const newOptions = poll.options.map(opt => {
                          let votes = opt.votes.filter(v => v !== currentUser.name);
                          if (opt.id === optionId) votes.push(currentUser.name);
                          return { ...opt, votes };
                      });
                      return { ...poll, options: newOptions };
                  });
                  await getFamilyDocRef(currentFamily.id).update({ polls: updatedPolls });
              } catch(e) {}
          };

          const handleDeletePoll = async (pollId) => {
              showConfirm("Abstimmung löschen", "Soll diese Abstimmung gelöscht werden?", async () => {
                  const updated = safePolls.filter(p => p.id !== pollId);
                  await getFamilyDocRef(currentFamily.id).update({ polls: updated });
              }, true);
          };

          // Gruppierung der aktuellen Einkaufsliste
          const activeShoppingItems = (activeList?.items || []).filter(item => !item.checked);
          const checkedShoppingItems = (activeList?.items || []).filter(item => item.checked);

          const groupedShoppingItems = {};
          SHOPPING_CATEGORIES.forEach(cat => groupedShoppingItems[cat] = []);
          activeShoppingItems.forEach(item => {
              if (groupedShoppingItems[item.category]) groupedShoppingItems[item.category].push(item);
              else groupedShoppingItems['Sonstiges'].push(item);
          });

          // Prüfe, ob Liste gerade von wem anders eingekauft wird
          const isLockedByOther = activeList?.shoppingActiveBy && activeList.shoppingActiveBy !== currentUser?.name;

          const resetExpenseForm = (overrides = {}) => {
              setExpenseForm({
                  amount: '',
                  reason: '',
                  date: getLocalTodayString(),
                  splitCount: 1,
                  splitTargets: [],
                  ...overrides
              });
          };

          const openSingleExpense = (target) => {
              resetExpenseForm();
              setExpenseModal({ mode: 'single', target });
          };

          const openSplitExpense = () => {
              resetExpenseForm({ splitCount: 2 });
              setExpenseModal({ mode: 'split' });
          };

          const openEditExpense = (expense) => {
              resetExpenseForm({
                  amount: String(expense?.amount ?? ''),
                  reason: expense?.reason ?? '',
                  date: expense?.date || getLocalTodayString(),
                  splitCount: 1,
                  splitTargets: []
              });
              setExpenseModal({ mode: 'edit', expense });
          };

          const toggleSplitTarget = (name) => {
              setExpenseForm(prev => {
                  const exists = prev.splitTargets.includes(name);
                  const nextTargets = exists
                      ? prev.splitTargets.filter(n => n !== name)
                      : [...prev.splitTargets, name];

                  return {
                      ...prev,
                      splitTargets: nextTargets
                  };
              });
          };

          const handleSaveExpense = async () => {
              if (!expenseForm.amount || !expenseForm.reason) return showAlert("Fehler", "Bitte Betrag und Grund angeben.");
              const cleanAmount = String(expenseForm.amount).replace(',', '.').replace(/[^0-9.]/g, '');
              const amountNum = parseFloat(cleanAmount);
              if (isNaN(amountNum) || amountNum <= 0) return showAlert("Fehler", "Ungültiger Betrag.");

              let newExpenses = [...safeExpenses];
              let historyPushes = [];

              if (expenseModal.mode === 'edit') {
                  newExpenses = newExpenses.map(e => e?.id === expenseModal.expense.id ? { ...e, amount: amountNum.toFixed(2), reason: expenseForm.reason, date: expenseForm.date } : e);
              } else if (expenseModal.mode === 'single') {
                  newExpenses.unshift({ id: generateId(), creditor: currentUser.name, debtor: expenseModal.target, amount: amountNum.toFixed(2), reason: expenseForm.reason, date: expenseForm.date, timestamp: new Date().toISOString(), isPaid: false });
                  historyPushes.push({ id: generateId(), timestamp: new Date().toISOString(), sender: currentUser.name, reason: `Neue Auslage: ${expenseForm.reason} (${amountNum.toFixed(2)}€)`, targets: [expenseModal.target], acknowledgedBy: [], isExpense: true });
              } else if (expenseModal.mode === 'split') {
                  const splitCount = parseInt(expenseForm.splitCount, 10);
                  
                  if (isNaN(splitCount) || splitCount < 1) {
                      return showAlert("Fehler", "Bitte gib an, durch wie viele Personen der Betrag geteilt wird.");
                  }
                  if (expenseForm.splitTargets.length === 0) {
                      return showAlert("Fehler", "Bitte wähle mindestens eine Person aus.");
                  }

                  const perPerson = (amountNum / splitCount).toFixed(2);
                  expenseForm.splitTargets.forEach(target => {
                      newExpenses.unshift({ id: generateId(), creditor: currentUser.name, debtor: target, amount: perPerson, reason: `${expenseForm.reason} (Anteilig)`, date: expenseForm.date, timestamp: new Date().toISOString(), isPaid: false });
                      historyPushes.push({ id: generateId(), timestamp: new Date().toISOString(), sender: currentUser.name, reason: `Neue geteilte Auslage: ${expenseForm.reason} (${perPerson}€)`, targets: [target], acknowledgedBy: [], isExpense: true });
                  });
              }

              try {
                  await getFamilyDocRef(currentFamily.id).update({ expenses: newExpenses });

              let dndTime = null;
              if (hours > 0) {

                  const exactMinutes = Math.round(hours * 60);
                  dndDate.setMinutes(dndDate.getMinutes() + exactMinutes); 
                  dndTime = dndDate.toISOString();

              await getFamilyDocRef(currentFamily.id).update({ members: safeMembers.map(m => m?.name === currentUser.name ? { ...m, dndUntil: dndTime } : m) });

          const handleDeleteMember = (memberName) => {

            const val = value ? String(value).trim() : '';
            await getFamilyDocRef(currentFamily.id).update({ members: safeMembers.map(m => m?.name === currentUser.name ? { ...m, [key]: val } : m) });

                                  <section className="bg-white dark:bg-[#1C1C1E] rounded-[20px] p-6 shadow-sm border border-[#E5E5EA] dark:border-[#38383A]">

                                  </section>

                                  <div className="space-y-6">
                                      {adminFamilies.map(fam => {
                                          const localSafeMembers = Array.isArray(fam.members) ? fam.members.filter(m => m && m.name) : [];
                                          const pushData = adminPushData[fam.id] || {title: '', message: ''};
                                          
                                          const handleSendAdminPushLocal = async () => {
                                              if (!pushData.title?.trim() || !pushData.message?.trim()) return showAlert("Fehler", "Bitte Überschrift und Nachricht eingeben.");
                                              const actualTargets = localSafeMembers.filter(m => m.status !== 'pending').map(m => m.name);
                                              if (actualTargets.length === 0) return showAlert("Hinweis", "Keine aktiven Mitglieder in dieser Familie.");

                                              setIsSending(true);
                                              const newHistoryItem = { 
                                                  id: Date.now().toString(), 
                                                  timestamp: new Date().toISOString(), 
                                                  sender: pushData.title.trim(), 
                                                  realSender: 'Haupt-Admin', 
                                                  reason: pushData.message.trim(), 
                                                  targets: actualTargets, 
                                                  acknowledgedBy: [], 
                                                  isExpense: false, 
                                                  isResend: false,
                                                  isCustomPush: true,
                                                  category: 'other' 
                                              };

                                              try {
                                                  await getFamilyDocRef(fam.id).update({ history: [newHistoryItem, ...(fam.history || [])].slice(0, 50) });
                                                  setAdminPushData({...adminPushData, [fam.id]: {title: '', message: ''}});
                                                  showAlert("Erfolgreich", "Rundruf gesendet!");
                                              } catch (err) {
                                                  showAlert("Fehler", "Senden fehlgeschlagen.");
                                              }
                                              setIsSending(false);
                                          };

                                          return (
                                              <div key={fam.id} className="bg-white dark:bg-[#1C1C1E] rounded-[24px] shadow-sm border border-[#E5E5EA] dark:border-[#38383A] overflow-hidden">
                                                  <div className="p-5 bg-[#F9F9F9] dark:bg-[#2C2C2E] border-b border-[#E5E5EA] dark:border-[#38383A] flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 sm:gap-0">
                                                      <div>
                                                          <h3 className="font-bold text-[20px] text-black dark:text-white">{fam.name}</h3>
                                                          <p className="text-[#8E8E93] dark:text-[#EBEBF5]/60 text-[13px] font-mono mt-1">ID: {fam.id}</p>
                                                      </div>
                                                      <div className="flex w-full sm:w-auto gap-2">
                                                          <button onClick={() => generatePDF(fam)} className="flex-1 sm:flex-none justify-center bg-[#007AFF]/10 text-[#007AFF] px-4 py-2.5 rounded-full text-[13px] font-semibold active:opacity-70 flex items-center gap-1.5 transition-opacity">
                                                              <Icon name="FileText" size={14} /> PDF Info-Blatt
                                                          </button>
                                                          <button onClick={() => adminDeleteFamily(fam.id)} className="bg-[#FF3B30]/10 text-[#FF3B30] w-10 h-10 sm:w-9 sm:h-9 rounded-full flex items-center justify-center active:opacity-70 shrink-0 transition-opacity">
                                                              <Icon name="Trash2" size={16} />

                                                          <textarea placeholder="Deine Nachricht an alle..." rows="2" className="w-full box-border bg-[var(--app-bg)] dark:bg-[#2C2C2E] px-4 py-3 rounded-[12px] outline-none font-medium focus:ring-2 ring-[#007AFF]/20 text-black dark:text-white placeholder-gray-500 resize-none" value={pushData.message} onChange={e => setAdminPushData({...adminPushData, [fam.id]: {...pushData, message: e.target.value}})}></textarea>

                                                      <h4 className="text-[13px] font-semibold text-[#8E8E93] uppercase tracking-widest mb-3 flex items-center gap-2"><Icon name="Smartphone" size={14}/> Kurzbefehl Links generieren</h4>
                                                      <div className="space-y-3">
                                                          {[

                                                              let rawConfig = localStorage.getItem(CONFIG_STORAGE_KEY) || localStorage.getItem('firebaseConfig');
                                                              const cfgBase64 = rawConfig ? encodeURIComponent(btoa(unescape(encodeURIComponent(rawConfig)))) : '';
                                                              const url = `${window.location.origin}${window.location.pathname}?action=shortcut&reason=${reason.id}&fid=${fam.id}&cfg=${cfgBase64}`;
                                                              return (
                                                                  <div key={reason.id} className="bg-[var(--app-bg)] dark:bg-[#2C2C2E] p-3.5 rounded-[16px]">
                                                                      <div className="flex justify-between items-center mb-2">
                                                                          <span className="font-semibold text-[15px] text-black dark:text-white flex items-center gap-2">
                                                                              <Icon name={reason.icon} size={16} /> {reason.label}
                                                                          </span>
                                                                          <button onClick={() => { 
                                                                              try {
                                                                                  const el = document.createElement('textarea'); el.value = url; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); showAlert('Kopiert!', 'Link in die Zwischenablage kopiert.');
                                                                              } catch(e) {}
                                                                          }} className="bg-[#007AFF]/10 text-[#007AFF] px-3 py-1.5 rounded-full text-[13px] font-bold active:opacity-70 transition-opacity">Kopieren</button>
                                                                      </div>
                                                                      <div className="text-[11px] text-[#8E8E93] dark:text-[#EBEBF5]/50 font-mono break-all line-clamp-2 overflow-hidden select-all">{url}</div>
                                                                  </div>
                                                              );
                                                          })}
                                                      </div>
                                                  </div>

                                                  <div className="p-5">
                                                      <h4 className="text-[13px] font-semibold text-[#8E8E93] uppercase tracking-widest mb-3">Mitglieder verwalten</h4>
                                                      <div className="space-y-3 mb-5">
                                                          {localSafeMembers.length === 0 && <p className="text-[#8E8E93] text-sm">Keine Mitglieder.</p>}
                                                          {localSafeMembers.map(m => (
                                                              <div key={m.name} className="flex justify-between items-center p-3.5 bg-[var(--app-bg)] dark:bg-[#2C2C2E] rounded-[14px]">
                                                                  <div className="flex items-center gap-3">
                                                                      <span className="font-semibold text-[16px] text-black dark:text-white">{m.name}</span>
                                                                      {m.status === 'pending' ? <span className="bg-[#FF9500]/20 text-[#FF9500] text-[11px] font-bold px-2 py-0.5 rounded-md uppercase">Ausstehend</span> : <span className="bg-[#34C759]/20 text-[#34C759] text-[11px] font-bold px-2 py-0.5 rounded-md uppercase">Aktiv</span>}
                                                                  </div>
                                                                  <button onClick={() => adminDeleteMember(fam.id, m.name)} className="text-[#FF3B30] active:opacity-70 p-1"><Icon name="Trash2" size={18} /></button>
                                                              </div>
                                                          ))}
                                                      </div>
                                                      <div className="flex flex-col sm:flex-row gap-3">
                                                          <input type="text" placeholder="Neuer Vorname" className="w-full sm:flex-1 bg-white dark:bg-[#1C1C1E] border border-[#E5E5EA] dark:border-[#38383A] px-4 py-3.5 rounded-[12px] outline-none font-medium focus:border-[#007AFF] box-border text-black dark:text-white placeholder-gray-500" value={newMemberNames[fam.id] || ''} onChange={e => setNewMemberNames({...newMemberNames, [fam.id]: e.target.value})} />
                                                          <button onClick={() => adminAddMember(fam)} className="w-full sm:w-auto bg-[#007AFF] text-white px-6 py-3.5 rounded-[12px] font-semibold active:opacity-80 transition-opacity">Registrieren</button>
                                                      </div>
                                                  </div>
                                              </div>
                                          );
                                      })}
                                  </div>
                              </div>
                          </main>
                      </div>
                  </div>
              );
          }

          if (!currentFamily || !currentUser) {
            
            if (localFamilyId) {
              return (
                <div className="h-full w-full bg-[var(--app-bg)] dark:bg-black text-black dark:text-white flex flex-col items-center justify-center p-6 font-sans relative z-40 overflow-hidden">
                  <div className="bg-white dark:bg-[#1C1C1E] border border-gray-200 dark:border-[#38383A] p-8 rounded-[32px] shadow-2xl w-full max-w-sm text-center">
                    <Icon name="ShieldCheck" size={56} className="text-[#FF9500] mx-auto mb-5 animate-pulse" />
                    <h2 className="text-[22px] font-bold mb-3">Verbinde...</h2>
                    <p className="text-[15px] text-gray-500 dark:text-[#EBEBF5]/60 mb-6 leading-relaxed">
                      Lade aktuelle Familiendaten... <br/><br/>
                      <span className="text-[13px] opacity-80">
                      Bitte überprüfe deine Internetverbindung, falls es länger dauert.
                      </span>
                    </p>
                    <button onClick={handleLogout} className="text-[#FF3B30] font-semibold active:opacity-70 text-[15px] mt-2">
                      Abmelden
                    </button>
                  </div>
                </div>
              );
            }

            return (
              <div className="h-full w-full bg-[#000000] text-white flex flex-col items-center justify-center p-6 font-sans relative z-40 overflow-hidden">
                <div className="absolute top-[0%] left-[-10%] w-[50vw] max-w-[400px] h-[50vw] max-h-[400px] rounded-full bg-[#007AFF] blur-[100px] opacity-20 pointer-events-none"></div>
                <div className="absolute bottom-[0%] right-[-10%] w-[50vw] max-w-[400px] h-[50vw] max-h-[400px] rounded-full bg-[#5856D6] blur-[100px] opacity-20 pointer-events-none"></div>

                <div className="bg-white/10 backdrop-blur-3xl border border-white/20 p-8 rounded-[32px] shadow-2xl w-full max-w-sm relative z-10 my-auto">
                  <div className="flex justify-center mb-6">
                    <div className="w-20 h-20 bg-gradient-to-tr from-[#007AFF] to-[#5856D6] rounded-2xl flex items-center justify-center shadow-lg">
                      <Icon name="ShieldCheck" size={40} className="text-white" />
                    </div>
                  </div>
                  <h1 className="text-[34px] font-bold text-center mb-8 tracking-tight">FamilyConnect</h1>
                  
                  <div className="flex bg-black/40 p-1 rounded-xl mb-8 backdrop-blur-md border border-white/10">
                    {['login', 'join', 'admin'].map((mode) => (
                      <button key={mode} className={`flex-1 py-2 text-[15px] font-semibold rounded-[8px] transition-all duration-300 ${authMode === mode ? 'bg-white/20 text-white shadow-sm' : 'text-[#8E8E93] active:opacity-70'}`} onClick={() => { if(navigator.vibrate) navigator.vibrate(10); setAuthMode(mode); setAuthError(''); }}>
                        {mode === 'login' ? 'Anmelden' : mode === 'join' ? 'Beitreten' : 'Admin'}
                      </button>
                    ))}
                  </div>

                  <div className="space-y-3">
                    {authMode === 'admin' ? (
                        <>
                            <input type="password" placeholder="Admin Master-Passwort" className="w-full bg-white/10 border border-white/10 px-4 py-3.5 rounded-xl outline-none focus:bg-white/20 text-white placeholder-gray-400 font-medium text-[17px] transition-colors box-border" value={formInput.password} onChange={e => setFormInput({...formInput, password: e.target.value})} />
                            {authError && <p className="text-[#FF3B30] text-[13px] text-center font-semibold mt-2">{authError}</p>}
                            <button onClick={() => { if(navigator.vibrate) navigator.vibrate(15); handleAdminAuth(); }} className="w-full bg-[#007AFF] text-white font-semibold text-[17px] py-3.5 rounded-xl mt-4 active:opacity-80 transition-opacity">Admin Login</button>
                        </>
                    ) : (
                        <>
                            <input type="text" placeholder="Familien-ID (6 Ziffern)" className="w-full bg-white/10 border border-white/10 px-4 py-3.5 rounded-xl outline-none focus:bg-white/20 text-white placeholder-gray-400 font-medium text-[17px] transition-colors box-border" value={formInput.familyId} onChange={e => setFormInput({...formInput, familyId: e.target.value})} />

                            <button onClick={() => { if(navigator.vibrate) navigator.vibrate(15); authMode === 'login' ? handleLogin() : handleJoinFamily(); }} className="w-full bg-[#007AFF] text-white font-semibold text-[17px] py-3.5 rounded-xl mt-4 active:opacity-80 transition-opacity">
                              {authMode === 'login' ? 'Anmelden' : 'Beitreten'}
                            </button>

          const trackingEvent = trackingEventId ? safeHistory.find(h => h.id === trackingEventId) : null;

          const nowGlobal = new Date();
          const isExecutionWindow = (nowGlobal.getDay() === 5 && nowGlobal.getHours() >= 16) || (nowGlobal.getDay() === 6);

          const activeCallEvent = safeHistory.find(h => {

              <LiquidTabBar activeTab={activeTab} setActiveTab={setActiveTab} isKeyboardOpen={isKeyboardOpen} />
            </div>
          );
        }

        // --- SHORTCUT BACKEND-SIMULATOR FÜR APPLE WATCH ---
        function ShortcutTrigger({ reason, fid }) {
            const [statusText, setStatusText] = useState('Sende Ruf...');

            useEffect(() => {
                const executeShortcut = async () => {
                    try {
                        const auth = firebase.auth();
                        await auth.signInAnonymously(); 

                        const docRef = db.doc(`artifacts/${appId}/public/data/families/${fid}`);
                        const docSnap = await docRef.get();

                        if (docSnap.exists) {
                            const data = docSnap.data();
                            const activeMembers = Array.isArray(data.members) ? data.members.filter(m => m && typeof m === 'object' && m.status !== 'pending') : [];
                            
                            const reasonObj = REASONS.find(r => r.id === reason) || { id: 'shortcut', category: 'other', sentence: 'Ruf über Kurzbefehl!' };
                            const now = new Date();
                            const isNightMode = now.getHours() >= 22 || now.getHours() < 7;
                            
                            const actualTargets = [];
                            activeMembers.forEach(member => {
                                const isDND = member.dndUntil && new Date(member.dndUntil) > now;
                                if (!isDND) {
                                    actualTargets.push(member.name);
                                    if (!isNightMode && reasonObj.category !== 'push_only') {
                                        const url = reasonObj.category === 'meal' ? member.voiceMonkeyMeal : member.voiceMonkeyOther;
                                        if (url && url.trim() !== '') fetch(url).catch(e => {});
                                    }
                                }
                            });

                            if (actualTargets.length > 0) {
                                const newHistoryItem = { 
                                    id: Date.now().toString(), 
                                    timestamp: now.toISOString(), 
                                    sender: 'Extern', 
                                    reason: reasonObj.sentence, 
                                    targets: actualTargets, 
                                    acknowledgedBy: [], 
                                    isExpense: false, 
                                    isResend: false,
                                    category: reasonObj.category
                                };
                                await docRef.update({ history: [newHistoryItem, ...(data.history || [])].slice(0, 50) });
                                setStatusText('Erfolgreich gesendet! ✅');
                                if(navigator.vibrate) navigator.vibrate([30, 50, 30]);
                            } else {
                                setStatusText('Alle im Nicht-Stören Modus 🔕');
                            }
                        } else {
                            setStatusText('Familie nicht gefunden ❌');
                        }
                    } catch(e) {
                        setStatusText('Verbindungsfehler ❌');
                    }
                };
                executeShortcut();
            }, [reason, fid]);

            return (
                <div className="h-full w-full bg-[var(--app-bg)] dark:bg-black text-black dark:text-white flex flex-col items-center justify-center p-8 text-center relative z-50">
                    <div className="bg-white dark:bg-[#1C1C1E] border border-[#E5E5EA] dark:border-[#38383A] p-8 rounded-[32px] shadow-2xl w-full max-w-sm text-center">
                        <div className="w-20 h-20 bg-[#007AFF]/10 text-[#007AFF] rounded-full flex items-center justify-center mx-auto mb-5">
                            <Icon name="Bell" size={36} />
                        </div>
                        <h2 className="text-[22px] font-bold mb-3">{statusText}</h2>
                        <p className="text-[15px] text-gray-500 dark:text-[#EBEBF5]/60 mb-6 leading-relaxed">
                            Dieses Fenster kann nun geschlossen werden.
                        </p>
                    </div>
                </div>
            );
        }

        function Root() {
            const params = new URLSearchParams(window.location.search);
            const isShortcut = params.get('action') === 'shortcut';
            const shortcutReason = params.get('reason');
            const shortcutFid = params.get('fid');

            const [config, setConfig] = useState(() => {
                try {
                    const urlCfg = params.get('cfg');
                    if (urlCfg) {
                        const decodedStr = decodeURIComponent(escape(atob(urlCfg)));
                        const parsedUrlCfg = JSON.parse(decodedStr);
                        localStorage.setItem(CONFIG_STORAGE_KEY, JSON.stringify(parsedUrlCfg));
                        return parsedUrlCfg;
                    }
                    
                    if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                        return typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config;
                    }
                    
                    const saved = localStorage.getItem(CONFIG_STORAGE_KEY) || localStorage.getItem('firebaseConfig');
                    if (saved) return JSON.parse(saved);
                } catch (e) { console.error("Config Setup Fehler:", e); }
                return null;
            });
            
            const [status, setStatus] = useState("booting"); 
            const [errorMsg, setErrorMsg] = useState("");

            useEffect(() => {
                if (!config) return setStatus("config-needed");
                
                setStatus("booting");
                try {
                    const finalConfig = config.firebaseConfig ? config.firebaseConfig : config;
                    if (!firebase.apps.length) app = firebase.initializeApp(finalConfig);
                    else app = firebase.app();
                    
                    db = firebase.firestore();
                    try {
                        db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
                    } catch (e) {}

                    auth = firebase.auth();
                    setStatus("ready");
                } catch (e) {
                    setErrorMsg("Verbindungsfehler: " + e.message);
                    setStatus("error");
                }
            }, [config]);

            if (status === "config-needed") return <ConfigLoader onConfigLoaded={setConfig} />;
            
            if (status === "error") {
                return (
                    <div className="h-full w-full bg-[var(--app-bg)] dark:bg-black text-black dark:text-white flex flex-col items-center justify-center p-8 text-center relative z-50">
                        <Icon name="ShieldCheck" size={64} className="text-[#FF3B30] mb-4" />
                        <h2 className="text-xl font-bold mb-2">Systemfehler</h2>
                        <p className="text-[#FF3B30] text-[15px] mb-8 font-mono bg-[#FF3B30]/10 p-4 rounded-[16px] border border-[#FF3B30]/20">{errorMsg}</p>
                        <button onClick={() => { localStorage.removeItem(CONFIG_STORAGE_KEY); localStorage.removeItem('firebaseConfig'); setConfig(null); setStatus("config-needed"); }} className="bg-[#007AFF] text-white px-6 py-3.5 rounded-[14px] font-semibold text-[17px] active:opacity-80 transition-opacity">
                            Neue Config laden
                        </button>
                    </div>
                );
            }

            if (status === "booting") {
                return (
                   <div className="h-full w-full bg-[var(--app-bg)] dark:bg-black flex flex-col items-center justify-center relative z-50">
                      <Icon name="ShieldCheck" size={64} strokeWidth={1.5} className="text-[#007AFF] animate-pulse mb-4" />
                   </div>
                );
            }

            if (isShortcut && shortcutReason && shortcutFid) {
                return <ShortcutTrigger reason={shortcutReason} fid={shortcutFid} />;
            }

            return <App />;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
